{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Book Appointment{% endblock %}

{% block content %}

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <!-- Header -->
            <div class="text-center mb-4">
                <i class="fas fa-calendar-plus fa-3x text-primary mb-3"></i>
                <h1 class="display-6 fw-bold">Make an Appointment</h1>
                <div class="divider mx-auto my-3"></div>
                <p class="text-muted">Fill out the form below and we'll contact you shortly</p>
            </div>
            
            <!-- Form Card -->
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <form method="POST" action="">
                        {% csrf_token %}
                        {{ form|crispy }}
                        
                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 mt-3">
                            <i class="fas fa-paper-plane me-2"></i>Submit Appointment
                        </button>
                    </form>
                </div>
            </div>
            
            <!-- Additional Info -->
            <div class="text-center mt-4">
                <small class="text-muted">
                    <i class="fas fa-lock me-1"></i> Your information is secure with us
                </small>
            </div>
        </div>
    </div>
</div>



{% endblock %}
